<!-- Lead Generation Popup Form -->
<div id="lead-popup" class="popup-overlay hidden opacity-0">
    <div class="popup-content-container">
        <div class="popup-card">
            <!-- Top Header Bar -->
            <div class="popup-top-header">
                <h2 class="header-title">Inquiry Form</h2>
                <button id="close-popup" class="popup-close-btn" aria-label="Close Form">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="popup-main-content">
                <!-- Single-Column Form Area -->
                <div class="popup-form-side">
                    <div class="form-intro">
                        <h3 class="form-heading">Get Your Free Quote...!</h3>
                        <p class="form-subline">Fill out this quick form and our expert will contact you shortly.</p>
                    </div>

                    <form id="popup-lead-form" class="popup-form">
                        <div class="form-grid">
                            <!-- Row 1 -->
                            <input type="text" id="popup-name" name="name" placeholder="Full Name *" required>
                            <input type="email" id="popup-email" name="email" placeholder="Email Address *" required>
                            
                            <!-- Row 2 -->
                            <input type="tel" id="popup-phone" name="phone" placeholder="Phone Number *"
                                pattern="[0-9]{10}" maxlength="10"
                                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                                title="Please enter exactly 10 digits" required>
                            <input type="text" id="popup-company" name="company" placeholder="Company Name">
                            
                            <!-- Row 3 -->
                            <input type="text" id="popup-country" name="country" placeholder="Country *" required>
                            <input type="text" id="popup-city" name="city" placeholder="City *" required>
                        </div>
                        
                        <!-- Row 4 -->
                        <div class="form-group full-width">
                            <textarea id="popup-requirement" name="requirement" rows="3"
                                placeholder="Requirement Detail *" required></textarea>
                        </div>

                        <button type="submit" class="popup-submit-btn">
                            <span>Submit Now!</span>
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>

                        <p class="form-footer-note text-center mt-3 text-[10px] text-slate-400">
                            * Your information is secure with us.
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
