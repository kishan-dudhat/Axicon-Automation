  <link rel="canonical" href="https://www.axiconautomation.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />

    content="Leader in Laser Marking, Cutting, and Industrial Automation. Precision engineering for the future of manufacturing." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS CDN & Config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'var(--primary)',
            secondary: 'var(--secondary)',
            trinary: 'var(--trinary)',
            offWhite: 'var(--off-white)',
            'bg-light': 'var(--bg-light)',
            'bg-dark': 'var(--bg-dark)',
            'bg-primary': 'var(--bg-primary)',
            'bg-secondary': 'var(--bg-secondary)',
            'bg-trinary': 'var(--bg-trinary)',
            'border-light': 'var(--border-light)',
            'border-dark': 'var(--border-dark)',
            'border-primary': 'var(--border-primary)',
            'border-secondary': 'var(--border-secondary)',
            'border-trinary': 'var(--border-trinary)',
          },
          fontFamily: {
            poppins: ['var(--font-poppins)'],
            inter: ['var(--font-inter)'],
            serif: ['var(--font-serif)'],
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="./public/assets/css/style.css" />

<body class="relative bg-bg-light text-secondary font-poppins">
  <!-- Page Loader (Premium Glassmorphism) -->
  <div id="page-loader"
    class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-white/40 backdrop-blur-2xl transition-all duration-300 hidden">
    <div class="flex flex-col items-center gap-8 transform scale-90 sm:scale-100">
      <div class="relative w-24 h-24 flex items-center justify-center">
        <!-- Outer glowing ring -->
        <div
          class="absolute inset-0 rounded-full border-[3px] border-slate-200/50 shadow-[0_0_20px_rgba(23,115,208,0.1)]">
        </div>
        <!-- Spinning active ring -->
        <div class="absolute inset-0 rounded-full border-t-[3px] border-brand animate-spin [animation-duration:0.8s]">
        </div>
        <!-- Logo centered -->
        <img src="./public/assets/images/axicon-logo.png" alt="Axicon" class="h-10 w-10 animate-pulse relative z-10"
          onerror="this.style.display='none'">
      </div>

      <div class="flex flex-col items-center gap-2">
        <h4 class="text-brand font-bold tracking-[0.3em] text-sm uppercase">Axicon Automation</h4>
        <div class="flex items-center gap-3">
          <span class="h-[1px] w-6 bg-slate-300"></span>
          <span class="text-[10px] text-slate-500 font-medium tracking-[0.2em] uppercase">Laser Solustions</span>
          <span class="h-[1px] w-6 bg-slate-300"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="header" class="fixed top-0 left-0 right-0 z-50"></div>

  <main id="app" class="min-h-screen">
    <!-- All page content -->
  </main>

  <div id="footer"></div>

  <!-- Popup Lead Form -->
  <div id="popupform"></div>

  <!-- WhatsApp Floating Button -->
  <a href="https://wa.me/9099653777" class="whatsapp-float" target="_blank" rel="noopener noreferrer"
    aria-label="Chat with us on WhatsApp">

  </a>
</body>

</html>
