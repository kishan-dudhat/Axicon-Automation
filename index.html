<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="./public/assets/images/axicon-automation-logo.webp" />
  <title>Axicon Automation | Industrial Automation Solutions</title>
  <meta name="description"
    content="Axicon Automation provides PLC, SCADA, robotics and industrial automation solutions across India." />
  <link rel="canonical" href="https://www.axiconautomation.com/" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS CDN & Config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'var(--primary)',
            secondary: 'var(--secondary)',
            trinary: 'var(--trinary)',
            offWhite: 'var(--off-white)',
            'bg-light': 'var(--bg-light)',
            'bg-dark': 'var(--bg-dark)',
            'bg-primary': 'var(--bg-primary)',
            'bg-secondary': 'var(--bg-secondary)',
            'bg-trinary': 'var(--bg-trinary)',
            'border-light': 'var(--border-light)',
            'border-dark': 'var(--border-dark)',
            'border-primary': 'var(--border-primary)',
            'border-secondary': 'var(--border-secondary)',
            'border-trinary': 'var(--border-trinary)',
          },
          fontFamily: {
            poppins: ['var(--font-poppins)'],
            inter: ['var(--font-inter)'],
            serif: ['var(--font-serif)'],
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="./public/assets/css/style.css" />
  <link rel="stylesheet" href="./public/assets/css/index.css" />

  <script type="module" src="/public/assets/js/main.js"></script>
</head>

<body class="relative bg-bg-light text-secondary font-poppins">
  <!-- Page Loader -->
  <div id="page-loader"
    class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-bg-light transition-opacity duration-300 hidden">
    <div class="relative flex justify-center items-center">
      <div class="absolute animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-primary"></div>
      <img src="./public/assets/images/axicon-automation-logo.webp" alt="Loading..."
        class="h-8 w-8 animate-pulse rounded-full" onerror="this.style.display='none'">
    </div>
    <p class="mt-4 text-primary font-semibold tracking-wider animate-pulse">LOADING...</p>
  </div>

  <div id="header" class="fixed top-0 left-0 right-0 z-50"></div>

  <main id="app" class="min-h-screen">
    <!-- All page content -->
  </main>

  <div id="footer"></div>
</body>

</html>
