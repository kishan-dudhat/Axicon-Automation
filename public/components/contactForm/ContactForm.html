<!-- contactForm.html -->
<div id="contactOverlay"
  class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center
         opacity-0 hidden transition-opacity duration-300 z-50">

  <!-- Modal -->
  <div id="contactModal"
    class="bg-white w-full max-w-xl mx-4 rounded-2xl shadow-xl
           transform scale-95 opacity-0 transition-all duration-300">

    <div class="flex justify-between items-center px-6 py-4 border-b">
      <h2 class="text-xl font-semibold">Contact Us</h2>
      <button data-contact-close
        class="w-9 h-9 rounded-full hover:bg-gray-100 flex items-center justify-center
               transition-colors duration-200">
        <span class="text-lg">✕</span>
      </button>
    </div>

    <form class="p-6 space-y-4">
      <input type="text" class="w-full border rounded-lg px-4 py-3 focus:ring-2 
             focus:ring-blue-500 focus:border-blue-500 outline-none transition"
             placeholder="Name" required>
      <input type="email" class="w-full border rounded-lg px-4 py-3 focus:ring-2 
             focus:ring-blue-500 focus:border-blue-500 outline-none transition"
             placeholder="Email" required>
      <input type="tel" class="w-full border rounded-lg px-4 py-3 focus:ring-2 
             focus:ring-blue-500 focus:border-blue-500 outline-none transition"
             placeholder="Phone">
      <textarea class="w-full border rounded-lg px-4 py-3 focus:ring-2 
                focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                rows="4" placeholder="Your message..." required></textarea>
    </form>

    <div class="px-6 py-4 border-t flex justify-end space-x-3">
      <button type="button" data-contact-close
        class="px-5 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 
               transition-colors duration-200">
        Cancel
      </button>
      <button type="submit"
        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 
               transition-colors duration-200">
        Send Message
      </button>
    </div>
  </div>
</div>
<!-- Note: Removed the script tag - we're loading JS separately -->
