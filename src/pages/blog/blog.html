<div class="blog-page-container">
    <!-- Hero Section (Shared) -->
    <section class="blog-hero relative overflow-hidden bg-bg-dark py-20 lg:py-32">
        <div class="container mx-auto px-6 relative z-10">
            <div class="max-w-3xl animate-on-scroll opacity-0 translate-y-10 transition-all duration-700">
                <span class="section-badge mb-4">Knowledge Hub</span>
                <h1 class="section-heading text-white mb-6">
                    Industrial <span class="text-brand">Insights</span> & <br class="hidden md:block"> Innovation Blog
                </h1>
                <p class="text-slate-400 text-lg md:text-xl leading-relaxed mb-8 max-w-2xl">
                    Deep dives into laser cutting, marking, and automation technology. Expert perspectives on the future of Indian smart manufacturing and industry 4.0.
                </p>
                <div class="flex flex-wrap gap-4" id="blog-filters">
                    <button class="filter-btn active" data-category="all">All Articles</button>
                    <button class="filter-btn" data-category="marking">Laser Marking</button>
                    <button class="filter-btn" data-category="cutting">Laser Cutting</button>
                </div>
            </div>
        </div>
        <!-- Decorative Background Elements -->
        <div class="absolute top-0 right-0 w-1/2 h-full opacity-10 pointer-events-none">
            <img src="./public/images/blog/hero-dark.png" alt="Axicon Insights" class="w-full h-full object-cover">
        </div>
        <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-brand/10 blur-[120px] rounded-full"></div>
    </section>

    <!-- Blog Grid Listing (Visible by default) -->
    <section id="blog-list-view" class="py-16 lg:py-24 bg-bg-light">
        <div class="container mx-auto px-6">
            <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 lg:gap-10">
                <!-- Blog cards will be injected here via blog.js -->
                <div class="col-span-full py-20 text-center">
                    <div class="inline-block w-12 h-12 border-4 border-brand border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 text-slate-500 font-medium">Loading industrial insights...</p>
                </div>
            </div>

            <!-- Load More Section -->
            <div id="load-more-container" class="mt-16 text-center hidden">
                <button id="load-more-btn" class="group relative px-8 py-4 bg-white border border-slate-200 text-slate-700 font-semibold rounded-full overflow-hidden transition-all duration-300 hover:border-brand hover:text-brand shadow-sm hover:shadow-md">
                    <span class="relative z-10 flex items-center justify-center gap-2">
                        Load More Articles
                        <i class="fa-solid fa-chevron-down text-xs transition-transform group-hover:translate-y-1"></i>
                    </span>
                </button>
            </div>
        </div>
    </section>

    <!-- Single Blog Post View (Hidden by default) -->
    <section id="blog-post-view" class="py-16 lg:py-24 bg-white hidden">
        <div class="container mx-auto px-6">
            <button id="back-to-blog" class="flex items-center gap-2 text-slate-500 hover:text-brand font-medium mb-12 transition-colors group">
                <i class="fa-solid fa-arrow-left transition-transform group-hover:-translate-x-1"></i>
                Back to all insights
            </button>

            <div id="post-content" class="max-w-4xl mx-auto">
                <!-- Full article content will be injected here -->
            </div>
        </div>
    </section>
</div>
