<!-- Hero Section -->
<section
  class="relative w-full h-[50vh] md:h-[60vh] lg:h-[75vh] min-h-[400px] flex items-center justify-center overflow-hidden lg:mb-5 bg-gray-900 border-b border-brand/20">
  <!-- Premium Gradient Overlay -->
  <div class="absolute inset-0 bg-gradient-to-b from-black/80 via-black/40 to-transparent z-10"></div>
  <div class="absolute inset-0 bg-black/30 z-10"></div>

  <img src="./public/images/contactImage/contact-hero-image-new.png"
    class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 hover:scale-105"
    alt="Contact Axicon Automation for Industrial Laser Solutions and Expert Consulting" />


  <div class="relative z-20 text-center px-4 md:px-8 mt-16 md:mt-24">
    <h1 class="
           text-light text-4xl sm:text-5xl md:text-6xl lg:text-6xl font-bold
           mb-4 sm:mb-6
           opacity-0 scale-95 translate-y-4
           transition-all duration-700 ease-out
           animate-on-scroll
         " style="font-family: 'Outfit', sans-serif;">
      Contact Us
    </h1>
    <p class="
           text-slate-300
           text-base sm:text-lg md:text-xl font-light
           opacity-0 translate-y-4
           transition-all duration-700 ease-out
           animate-on-scroll
           mb-10 max-w-3xl leading-relaxed mx-auto
         ">
      Our team of experts is ready to help you navigate the future of industrial automation. Reach out for a
      consultation.
    </p>
  </div>


</section>

<!-- Main Contact Form Section -->
<section class="pb-24 px-4 bg-gradient-to-br from-[#ffffff] to-[#f8fafc] relative z-20 rounded-t-3xl">
  <div class="max-w-6xl mx-auto relative z-10">

    <!-- Form Container -->
    <div
      class="bg-primary rounded-[2.5rem] shadow-[0_30px_60px_rgba(0,0,0,0.06)] border border-gray-100 overflow-hidden max-w-4xl mx-auto animate-on-scroll opacity-0 translate-y-12">
      <div class="p-8 md:p-12 lg:p-14">
        <form id="contactForm" class="space-y-12" novalidate>

          <!-- Section 1: Personal Info -->
          <div>
            <h4 class="text-xl font-bold text-[#1e293b] mb-6 flex items-center gap-3">
              <i class="fa-solid fa-user-tie text-brand text-xs"></i>
              Personal Details
            </h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <!-- Name -->
              <div class="space-y-2">
                <input type="text" id="name" name="name" required placeholder="Full Name *"
                  class="w-full px-5 py-4 bg-secondary border border-color text-[#1e293b] rounded-2xl outline-none focus:ring-4 focus:ring-brand/10 focus:border-brand transition-all duration-300 shadow-sm" />
                <p id="nameErr" class="text-xs text-red-500 hidden font-medium ml-1">Name is required.</p>
              </div>
              <!-- Contact Number -->
              <div class="space-y-2">
                <input type="tel" id="contactNumber" name="phone" required placeholder="Contact Number *"
                  class="w-full px-5 py-4 bg-secondary border border-color text-[#1e293b] rounded-2xl outline-none focus:ring-4 focus:ring-brand/10 focus:border-brand transition-all duration-300 shadow-sm" />
                <p id="contactNumberErr" class="text-xs text-red-500 hidden font-medium ml-1">Valid number required.</p>
              </div>
              <!-- Email -->
              <div class="space-y-2">
                <input type="email" id="email" name="email" required placeholder="Email Address *"
                  class="w-full px-5 py-4 bg-secondary border border-color text-[#1e293b] rounded-2xl outline-none focus:ring-4 focus:ring-brand/10 focus:border-brand transition-all duration-300 shadow-sm" />
                <p id="emailErr" class="text-xs text-red-500 hidden font-medium ml-1">Valid email required.</p>
              </div>
              <!-- Country -->
              <div class="space-y-2">
                <input type="text" id="country" name="country" required placeholder="Country *"
                  class="w-full px-5 py-4 bg-secondary border border-color text-[#1e293b] rounded-2xl outline-none focus:ring-4 focus:ring-brand/10 focus:border-brand transition-all duration-300 shadow-sm" />
                <p id="countryErr" class="text-xs text-red-500 hidden font-medium ml-1">Country is required.</p>
              </div>
              <!-- City (Full Width row if needed or keep inline) -->
              <div class="md:col-span-2 space-y-2">
                <input type="text" id="city" name="city" required placeholder="City / Location *"
                  class="w-full px-5 py-4 bg-secondary border border-color text-[#1e293b] rounded-2xl outline-none focus:ring-4 focus:ring-brand/10 focus:border-brand transition-all duration-300 shadow-sm" />
                <p id="cityErr" class="text-xs text-red-500 hidden font-medium ml-1">City is required.</p>
              </div>
            </div>
          </div>

          <!-- Section 2: Message -->
          <div>
            <hr class="border-gray-100 mb-10" />
            <h4 class="text-xl font-bold text-[#1e293b] mb-6 flex items-center gap-3">
              <i class="fa-solid fa-comment-dots text-brand text-xs"></i>
              Your Inquiry
            </h4>
            <div class="space-y-2 group">
              <textarea id="message" name="message" required rows="5"
                placeholder="How can we help you? Describe your requirements..."
                class="w-full px-5 py-5 bg-secondary border border-color text-[#1e293b] rounded-2xl outline-none focus:ring-4 focus:ring-brand/10 focus:border-brand transition-all duration-300 resize-none shadow-sm"></textarea>
              <p id="messageErr" class="text-xs text-red-500 hidden font-medium ml-1 mt-1 transition-all">Please provide
                a message.</p>
            </div>
          </div>

          <!-- Submit Button -->
          <div class="pt-6">
            <button type="submit"
              class="w-full group py-5 px-8 rounded-2xl text-light font-bold text-xl bg-brand hover:bg-brand-dark shadow-xl transform transition-all duration-300 hover:-translate-y-1 flex items-center justify-center gap-4">
              <span>Send Message</span>
              <i
                class="fa-regular fa-paper-plane group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
